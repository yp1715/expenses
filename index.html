<!-- Property Ledger — rental expense tracker -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Property Ledger</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --paper:#F6F4EF;
  --card:#FFFFFF;
  --ink:#19222E;
  --green:#1F5F4F;
  --green-soft:#E7F0EC;
  --brass:#B07A2C;
  --clay:#B14A33;
  --slate:#6A7480;
  --line:#E4DFD5;
  --line-strong:#D6D0C3;
  --shadow:0 1px 2px rgba(25,34,46,.05), 0 8px 24px rgba(25,34,46,.05);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Hanken Grotesk',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;
  line-height:1.45;
}
.mono{font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;font-variant-numeric:tabular-nums}
.num{font-family:'IBM Plex Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ---------- shell ---------- */
.wrap{max-width:1120px;margin:0 auto;padding:0 20px 96px}
header.top{
  position:sticky;top:0;z-index:40;background:rgba(246,244,239,.86);
  backdrop-filter:saturate(180%) blur(8px);border-bottom:1px solid var(--line);
}
.top-inner{max-width:1120px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px;margin-right:auto}
.brand .key{
  width:34px;height:34px;border-radius:9px;background:var(--green);color:#fff;
  display:grid;place-items:center;box-shadow:var(--shadow);flex:none;
}
.brand h1{font-size:1.04rem;font-weight:800;letter-spacing:-.01em;margin:0;line-height:1.1}
.brand small{display:block;color:var(--slate);font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:1px}

.fyselect{display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line-strong);border-radius:10px;padding:3px;box-shadow:var(--shadow)}
.fyselect button{border:0;background:transparent;width:30px;height:30px;border-radius:7px;cursor:pointer;color:var(--ink);font-size:1rem;display:grid;place-items:center}
.fyselect button:hover{background:var(--green-soft)}
.fyselect .fylabel{padding:0 8px;text-align:center;min-width:104px}
.fyselect .fylabel .yr{font-weight:700;font-size:.92rem;letter-spacing:.02em}
.fyselect .fylabel .rng{display:block;font-size:.6rem;color:var(--slate);letter-spacing:.04em;margin-top:-1px}

.btn{cursor:pointer;border-radius:10px;border:1px solid transparent;font-weight:700;font-size:.86rem;padding:9px 15px;display:inline-flex;align-items:center;gap:7px;transition:transform .08s ease, background .15s ease}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--green);color:#fff;box-shadow:var(--shadow)}
.btn-primary:hover{background:#1a5345}
.btn-ghost{background:var(--card);color:var(--ink);border-color:var(--line-strong)}
.btn-ghost:hover{background:#fbfaf7}
.btn-sm{padding:6px 11px;font-size:.78rem;border-radius:8px}
.btn-danger{background:#fff;color:var(--clay);border-color:#e7c7bf}
.btn-danger:hover{background:#fbeeea}

/* ---------- nav tabs ---------- */
nav.tabs{display:flex;gap:4px;margin:22px 0 26px;border-bottom:1px solid var(--line);overflow-x:auto}
nav.tabs button{border:0;background:transparent;cursor:pointer;padding:10px 4px;margin-right:22px;font-size:.92rem;font-weight:600;color:var(--slate);position:relative;white-space:nowrap}
nav.tabs button[aria-selected="true"]{color:var(--ink)}
nav.tabs button[aria-selected="true"]::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--green);border-radius:2px}
nav.tabs button:hover{color:var(--ink)}

/* ---------- hero ---------- */
.hero{
  background:var(--ink);color:#fff;border-radius:18px;padding:26px 28px;position:relative;overflow:hidden;
  box-shadow:0 14px 40px rgba(25,34,46,.18);
}
.hero::before{content:"";position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px);
  background-size:100% 30px;opacity:.5;pointer-events:none}
.hero .eyebrow{font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#9fb4ac}
.hero .total{font-size:clamp(2.4rem,7vw,3.5rem);font-weight:600;letter-spacing:-.02em;line-height:1;margin:6px 0 4px}
.hero .meta{color:#b9c4c0;font-size:.86rem}
.hero .meta b{color:#fff;font-weight:600}
.spark{display:flex;align-items:flex-end;gap:4px;height:46px;margin-top:18px}
.spark .bar{flex:1;background:linear-gradient(var(--brass),#cf9a4d);border-radius:3px 3px 0 0;min-height:2px;opacity:.92;position:relative}
.spark .bar span{position:absolute;bottom:-17px;left:0;right:0;text-align:center;font-size:.56rem;color:#8c9a95;font-family:'IBM Plex Mono',monospace}

/* ---------- cards/grid ---------- */
.section-title{font-size:.74rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--slate);margin:30px 0 12px}
.pcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.pcard .swatch{height:4px;border-radius:4px;width:42px;margin-bottom:12px}
.pcard h3{margin:0;font-size:1rem;font-weight:700;letter-spacing:-.01em}
.pcard .addr{color:var(--slate);font-size:.78rem;margin:2px 0 14px;min-height:1em}
.pcard .amt{font-size:1.5rem;font-weight:600}
.pcard .sub{color:var(--slate);font-size:.74rem;margin-top:2px}

.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
.panel h4{margin:0 0 14px;font-size:.95rem;font-weight:700}
.panel .chart-box{position:relative;height:240px}
.panel.full{grid-column:1/-1}
.legend{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.legend .row{display:flex;align-items:center;gap:9px;font-size:.82rem}
.legend .dot{width:10px;height:10px;border-radius:3px;flex:none}
.legend .lname{flex:1;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend .lamt{color:var(--slate)}

/* ---------- toolbar / filters ---------- */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.toolbar .grow{flex:1;min-width:160px}
select,input[type=text],input[type=date],input[type=number],textarea{
  font-family:inherit;font-size:.88rem;color:var(--ink);background:var(--card);
  border:1px solid var(--line-strong);border-radius:9px;padding:9px 11px;width:100%;
}
input[type=date],input[type=number]{font-family:'IBM Plex Mono',monospace}
textarea{resize:vertical;min-height:62px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.74rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
.field .hint{font-size:.72rem;color:var(--slate);margin-top:5px;font-weight:500}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ---------- ledger table ---------- */
.ledger{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.lhead,.lrow{display:grid;grid-template-columns:96px 1.4fr 1.4fr 84px 120px;gap:10px;align-items:center;padding:12px 16px}
.lhead{background:#fbfaf7;border-bottom:1px solid var(--line);font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--slate)}
.lhead .ta-r,.lrow .ta-r{text-align:right;justify-self:end}
.lrow{border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
.lrow:last-child{border-bottom:0}
.lrow:hover{background:#fbfaf7}
.lrow .date{font-size:.82rem;color:var(--slate)}
.lrow .desc{font-weight:600;font-size:.9rem}
.lrow .desc small{display:block;color:var(--slate);font-weight:500;font-size:.74rem}
.lrow .prop{display:flex;align-items:center;gap:8px;font-size:.85rem;min-width:0}
.lrow .prop .dot{width:9px;height:9px;border-radius:3px;flex:none}
.lrow .prop span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lrow .amt{font-weight:600;font-size:.95rem}
.tag{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:600;color:var(--ink);background:#f3f1ec;border-radius:999px;padding:3px 9px;white-space:nowrap}
.tag .dot{width:7px;height:7px;border-radius:50%}
.clip{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:6px;background:var(--green-soft);color:var(--green)}
.clip.none{background:transparent;color:var(--line-strong)}
.lfoot{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#fbfaf7;border-top:1px solid var(--line);font-weight:700}
.lfoot .tot{font-size:1.15rem}

/* ---------- empty ---------- */
.empty{background:var(--card);border:1px dashed var(--line-strong);border-radius:16px;padding:48px 24px;text-align:center}
.empty .big{width:54px;height:54px;border-radius:14px;background:var(--green-soft);color:var(--green);display:grid;place-items:center;margin:0 auto 16px}
.empty h3{margin:0 0 6px;font-size:1.2rem}
.empty p{margin:0 auto 20px;color:var(--slate);max-width:380px;font-size:.92rem}

/* ---------- property list ---------- */
.plist{display:flex;flex-direction:column;gap:12px}
.pitem{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px}
.pitem .bar{width:5px;align-self:stretch;border-radius:4px;flex:none}
.pitem .info{flex:1;min-width:0}
.pitem .info h3{margin:0;font-size:1.04rem;font-weight:700}
.pitem .info .addr{color:var(--slate);font-size:.82rem}
.pitem .stat{text-align:right;flex:none}
.pitem .stat .a{font-weight:600;font-size:1.1rem}
.pitem .stat .b{color:var(--slate);font-size:.74rem}
.pitem .acts{display:flex;gap:6px;flex:none}

/* ---------- modal ---------- */
.scrim{position:fixed;inset:0;background:rgba(25,34,46,.42);backdrop-filter:blur(2px);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow:auto}
.modal{background:var(--card);border-radius:18px;width:100%;max-width:520px;box-shadow:0 24px 70px rgba(25,34,46,.32);margin:auto 0}
.modal .mhead{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--line)}
.modal .mhead h2{margin:0;font-size:1.12rem;font-weight:800}
.modal .mbody{padding:20px 22px}
.modal .mfoot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.x{border:0;background:transparent;cursor:pointer;color:var(--slate);width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:1.2rem}
.x:hover{background:#f3f1ec;color:var(--ink)}

.drop{border:1.5px dashed var(--line-strong);border-radius:12px;padding:16px;text-align:center;cursor:pointer;background:#fbfaf7;transition:border-color .15s,background .15s}
.drop:hover{border-color:var(--green);background:var(--green-soft)}
.drop .di{color:var(--slate);font-size:.84rem}
.receipt-prev{margin-top:10px;border:1px solid var(--line);border-radius:10px;overflow:hidden;position:relative}
.receipt-prev img{display:block;width:100%;max-height:280px;object-fit:contain;background:#f3f1ec}
.receipt-prev .pdf{padding:18px;display:flex;align-items:center;gap:10px;font-size:.86rem;font-weight:600}
.receipt-prev .rm{position:absolute;top:8px;right:8px;background:rgba(25,34,46,.8);color:#fff;border:0;border-radius:8px;padding:5px 9px;font-size:.74rem;cursor:pointer;font-weight:600}

.viewer{max-width:760px}
.viewer img{width:100%;border-radius:10px;display:block}
.viewer iframe{width:100%;height:70vh;border:0;border-radius:10px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-size:.86rem;font-weight:600;box-shadow:0 12px 30px rgba(25,34,46,.3);opacity:0;pointer-events:none;transition:.25s;z-index:80}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.note{background:#fff8ec;border:1px solid #f0dcb4;border-radius:10px;padding:11px 13px;font-size:.78rem;color:#7a5a1e;display:flex;gap:9px;margin-bottom:14px}
.note b{font-weight:700}

.syncbtn{border:1px solid var(--line-strong);background:var(--card);width:38px;height:38px;border-radius:10px;cursor:pointer;color:var(--ink);display:grid;place-items:center;box-shadow:var(--shadow)}
.syncbtn:hover{background:var(--green-soft);color:var(--green)}
.syncbtn.spin svg{animation:spin .6s linear}
@keyframes spin{to{transform:rotate(360deg)}}
.idchip{display:flex;align-items:center;gap:7px;border:1px solid var(--line-strong);background:var(--card);border-radius:999px;padding:5px 13px 5px 6px;cursor:pointer;font-size:.82rem;font-weight:600;color:var(--ink);box-shadow:var(--shadow);max-width:170px}
.idchip:hover{background:#fbfaf7}
.idchip .av{width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;flex:none}
.idchip #idName{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sharebar{display:flex;align-items:flex-start;gap:11px;background:var(--green-soft);border:1px solid #cfe3da;border-radius:12px;padding:12px 14px;margin-bottom:18px;font-size:.84rem;color:#1d4d40;line-height:1.4}
.sharebar b{font-weight:700}
.sharebar .x{margin-left:auto;color:#1d4d40;flex:none}
.sharebar .x:hover{background:#d8ece4}

body.locked{overflow:hidden}
.gate{position:fixed;inset:0;z-index:200;background:var(--paper);display:grid;place-items:center;padding:24px}
.gate-card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 20px 60px rgba(25,34,46,.16);padding:34px 30px;width:100%;max-width:380px;text-align:center}
.gate-key{width:54px;height:54px;border-radius:15px;background:var(--green);color:#fff;display:grid;place-items:center;margin:0 auto 18px}
.gate-key.danger{background:var(--clay)}
.gate-card h1{margin:0 0 8px;font-size:1.3rem;font-weight:800;letter-spacing:-.01em}
.gate-sub{margin:0 0 20px;color:var(--slate);font-size:.9rem;line-height:1.5}
.gate-field{margin-bottom:10px}
.gate-field input{text-align:center;font-size:1rem;padding:12px;font-family:inherit;letter-spacing:.02em}
.gate-err{color:var(--clay);font-size:.82rem;font-weight:600;min-height:1.1em;margin:2px 0 8px}
.gate-btn{width:100%;justify-content:center;padding:12px;font-size:.95rem;margin-top:4px}
.gate-note{margin:16px 0 0;font-size:.74rem;color:var(--slate);line-height:1.55}
.gate-link{background:none;border:0;color:var(--slate);text-decoration:underline;cursor:pointer;font-size:.82rem;margin-top:14px;font-family:inherit}
.gate-link:hover{color:var(--ink)}

.exp-sec{padding:16px 0;border-top:1px solid var(--line)}
.exp-sec:first-child{padding-top:0;border-top:0}
.exp-sec h3{margin:0 0 4px;font-size:1rem;font-weight:700}
.exp-p{margin:0 0 12px;color:var(--slate);font-size:.84rem;line-height:1.5}
.radio,.check{display:flex;align-items:center;gap:9px;font-size:.88rem;padding:7px 0;cursor:pointer}
.radio input,.check input{width:auto;margin:0;accent-color:var(--green)}

@media (max-width:760px){
  .panels{grid-template-columns:1fr}
  .lhead{display:none}
  .lrow{grid-template-columns:1fr auto;grid-template-areas:"prop amt" "desc amt" "date clip";gap:4px 12px;padding:14px 16px}
  .lrow .prop{grid-area:prop}
  .lrow .desc{grid-area:desc}
  .lrow .date{grid-area:date}
  .lrow .amt{grid-area:amt;align-self:center;font-size:1.05rem}
  .lrow .clip{grid-area:clip;justify-self:end}
  .lrow .cat-cell{display:none}
  .row2{grid-template-columns:1fr}
  .pitem{flex-wrap:wrap}
  .pitem .acts{width:100%;justify-content:flex-end}
}
</style>

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <div class="key" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><path d="M9 9h.01M9 13h.01M9 17h.01"/></svg>
      </div>
      <div>
        <h1>Property Ledger</h1>
        <small>Rental expense tracker</small>
      </div>
    </div>
    <div class="fyselect" role="group" aria-label="Tax year">
      <button id="fyPrev" aria-label="Previous tax year">‹</button>
      <div class="fylabel"><span class="yr" id="fyYr">—</span><span class="rng" id="fyRng"></span></div>
      <button id="fyNext" aria-label="Next tax year">›</button>
    </div>
    <button class="syncbtn" id="lockBtn2" title="Security" aria-label="Security">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
    </button>
    <button class="syncbtn" id="syncBtn" title="Sync now" aria-label="Sync now">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
    </button>
    <button class="idchip" id="idChip" title="Change your name">
      <span class="av"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></span>
      <span id="idName">Set your name</span>
    </button>
    <button class="btn btn-primary" id="addBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>

    </button>
  </div>
</header>

<div class="wrap">
  <nav class="tabs" role="tablist">
    <button role="tab" data-view="dashboard" aria-selected="true">Dashboard</button>
    <button role="tab" data-view="expenses" aria-selected="false">Expenses</button>
    <button role="tab" data-view="properties" aria-selected="false">Properties</button>
  </nav>
  <div class="sharebar" id="shareBanner" style="display:none">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex:none;margin-top:1px"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
    <div><b>Shared family ledger.</b> Everyone with the site link and the password can view and edit all properties, expenses and receipts. Your data is encrypted with the password before it's saved, so the database only ever holds unreadable ciphertext.</div>
    <button class="x" onclick="dismissBanner()" aria-label="Dismiss">✕</button>
  </div>
  <main id="view"></main>
</div>

<div id="modalRoot"></div>
<div id="gateRoot"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";

/* ============================ storage ============================ */
const MAIN_KEY = "rental-ledger-v1";
/* ============================================================
   SUPABASE CONFIG  — paste your project values here, then reload.
   Find them in Supabase: Project Settings → API.
   ============================================================ */
const SUPABASE_URL = "https://eqxrnsmtnyxemnzovegh.supabase.co";          // e.g. https://abcd1234.supabase.co
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxeHJuc210bnl4ZW1uem92ZWdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMTM3OTMsImV4cCI6MjA5Nzc4OTc5M30.ghWzBcTYHfOtJri9cy4JCq-osWotCnwwisPsA5k9x2s"; // the public "anon" key
const LEDGER_EMAIL = "ypatel123786@hotmail.co.uk";       // the shared login email you create in Supabase (not secret)

const SB_READY = /^https:\/\/.+\.supabase\.co\/?$/.test(SUPABASE_URL) && SUPABASE_ANON_KEY.length > 30;
const sb = (SB_READY && window.supabase) ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {auth:{persistSession:false}}) : null;

/* Storage layer: shared data -> Supabase (encrypted ciphertext only);
   per-device prefs (your name, dismissed banner) -> localStorage. */
const LS_PREFIX = "rentledger:";
function routeTable(key){
  if(key.startsWith("prop:"))    return {t:"properties", id:key.slice(5)};
  if(key.startsWith("exp:"))     return {t:"expenses",   id:key.slice(4)};
  if(key.startsWith("receipt:")) return {t:"receipts",   id:key.slice(8)};
  return {t:"meta", id:key};
}
function prefixTable(prefix){
  if(prefix==="prop:")    return "properties";
  if(prefix==="exp:")     return "expenses";
  if(prefix==="receipt:") return "receipts";
  return null;
}
const Store = {
  async get(k, shared=false){
    if(!shared){ try{ return localStorage.getItem(LS_PREFIX+k); }catch(e){ return null; } }
    const r=routeTable(k);
    const {data,error}=await sb.from(r.t).select("data").eq("id", r.id).maybeSingle();
    if(error){ console.error("get",error); return null; }
    return data ? data.data : null;
  },
  async set(k, v, shared=false){
    if(!shared){ try{ localStorage.setItem(LS_PREFIX+k, v); }catch(e){} return true; }
    const r=routeTable(k);
    const {error}=await sb.from(r.t).upsert({id:r.id, data:v, updated_at:new Date().toISOString()});
    if(error){ console.error("set",error); return false; }
    return true;
  },
  async del(k, shared=false){
    if(!shared){ try{ localStorage.removeItem(LS_PREFIX+k); }catch(e){} return; }
    const r=routeTable(k);
    const {error}=await sb.from(r.t).delete().eq("id", r.id);
    if(error) console.error("del",error);
  },
  async list(prefix, shared=false){
    if(!shared){
      const out=[]; for(let i=0;i<localStorage.length;i++){ const kk=localStorage.key(i); if(kk&&kk.startsWith(LS_PREFIX+prefix)) out.push(kk.slice(LS_PREFIX.length)); } return out;
    }
    const t=prefixTable(prefix); if(!t) return [];
    const {data,error}=await sb.from(t).select("id");
    if(error){ console.error("list",error); return []; }
    return (data||[]).map(row=>prefix+row.id);
  }
};

/* ============================ crypto / auth ============================ */
const ENC=new TextEncoder(), DEC=new TextDecoder();
const AUTH_KEY="_auth", VERIFIER="property-ledger-ok", PBKDF2_ITERS=150000;
let CRYPTO_KEY=null;

function abToB64(buf){ const b=new Uint8Array(buf); let s=""; const ch=0x8000; for(let i=0;i<b.length;i+=ch){ s+=String.fromCharCode.apply(null,b.subarray(i,i+ch)); } return btoa(s); }
function b64ToU8(b64){ const bin=atob(b64); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; }
function isEncBlob(s){ try{ const o=JSON.parse(s); return o&&typeof o.iv==="string"&&typeof o.ct==="string"; }catch(e){ return false; } }

async function deriveKey(password, saltB64, iters){
  const base=await crypto.subtle.importKey("raw", ENC.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:b64ToU8(saltB64), iterations:iters, hash:"SHA-256"}, base, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
}
async function encWith(key, text){ const iv=crypto.getRandomValues(new Uint8Array(12)); const ct=await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, ENC.encode(text)); return JSON.stringify({iv:abToB64(iv), ct:abToB64(ct)}); }
async function decWith(key, blob){ const o=JSON.parse(blob); const pt=await crypto.subtle.decrypt({name:"AES-GCM", iv:b64ToU8(o.iv)}, key, b64ToU8(o.ct)); return DEC.decode(pt); }

async function getAuth(){ const r=await Store.get(AUTH_KEY,true); if(!r) return null; try{ return JSON.parse(r); }catch(e){ return null; } }

async function setupPassword(password){
  const salt=abToB64(crypto.getRandomValues(new Uint8Array(16)));
  const key=await deriveKey(password, salt, PBKDF2_ITERS);
  await encryptExistingData(key);
  const verifier=await encWith(key, VERIFIER);
  await Store.set(AUTH_KEY, JSON.stringify({v:1, salt, iters:PBKDF2_ITERS, verifier}), true);
  CRYPTO_KEY=key;
}
async function tryUnlock(password){
  const auth=await getAuth(); if(!auth) return false;
  try{ const key=await deriveKey(password, auth.salt, auth.iters); const t=await decWith(key, auth.verifier); if(t===VERIFIER){ CRYPTO_KEY=key; return true; } }catch(e){}
  return false;
}
/* Sign in to the single shared Supabase account using the typed password.
   The email is fixed and public; the password is never stored in the page,
   so without it the database (RLS = authenticated only) can't be touched. */
async function sbSignIn(password){
  try{ const {error}=await sb.auth.signInWithPassword({email:LEDGER_EMAIL, password}); return !error; }
  catch(e){ console.error("signIn",e); return false; }
}
async function sbSignOut(){ try{ await sb.auth.signOut(); }catch(e){} }

// One password unlocks both layers: Supabase access + on-device decryption.
async function attemptUnlock(password){
  const signedIn = await sbSignIn(password);
  if(!signedIn) return {ok:false, reason:"auth"};
  const auth = await getAuth();
  if(!auth){ await setupPassword(password); return {ok:true}; }   // first run: initialise encryption
  const ok = await tryUnlock(password);
  return ok ? {ok:true} : {ok:false, reason:"enc"};
}

async function changePassword(newPassword){
  // 1) rotate the shared Supabase login password (session stays valid)
  const {error}=await sb.auth.updateUser({password:newPassword});
  if(error) throw error;
  // 2) re-encrypt all data under a key derived from the new password
  const oldKey=CRYPTO_KEY;
  const salt=abToB64(crypto.getRandomValues(new Uint8Array(16)));
  const newKey=await deriveKey(newPassword, salt, PBKDF2_ITERS);
  for(const pref of ["prop:","exp:","receipt:"]){
    for(const k of await Store.list(pref,true)){
      const b=await Store.get(k,true); if(!b) continue;
      let plain; try{ plain=await decWith(oldKey,b); }catch(e){ continue; }
      await Store.set(k, await encWith(newKey, plain), true);
    }
  }
  const verifier=await encWith(newKey, VERIFIER);
  await Store.set(AUTH_KEY, JSON.stringify({v:1, salt, iters:PBKDF2_ITERS, verifier}), true);
  CRYPTO_KEY=newKey; await bumpVer();
}
async function wipeAll(){
  for(const pref of ["prop:","exp:","receipt:"]){ for(const k of await Store.list(pref,true)) await Store.del(k,true); }
  await Store.del(AUTH_KEY,true); await Store.del("_ver",true);
}
// Encrypt any pre-existing plaintext data (from earlier versions) the first time a password is set
async function encryptExistingData(key){
  let found=false;
  for(const pref of ["prop:","exp:","receipt:"]){
    for(const k of await Store.list(pref,true)){
      const v=await Store.get(k,true); if(!v) continue; found=true;
      if(isEncBlob(v)) continue;
      await Store.set(k, await encWith(key, v), true);
    }
  }
  if(!found){
    const raw=await Store.get(MAIN_KEY,false);
    if(raw){ let old; try{ old=JSON.parse(raw); }catch(e){ old=null; }
      if(old){
        for(const p of (old.properties||[])) await Store.set("prop:"+p.id, await encWith(key, JSON.stringify(p)), true);
        for(const e of (old.expenses||[])){
          await Store.set("exp:"+e.id, await encWith(key, JSON.stringify(e)), true);
          if(e.hasReceipt){ const r=await Store.get("receipt:"+e.id,false); if(r) await Store.set("receipt:"+e.id, await encWith(key, r), true); }
        }
      }
    }
  }
  await bumpVer();
}

  const props=[], exps=[];
  for(const k of await Store.list("prop:",true)){ const b=await Store.get(k,true); if(!b) continue; try{ props.push(JSON.parse(await decWith(CRYPTO_KEY,b))); }catch(e){} }

  DB.expenses = exps;
}

function compressImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const max=1500; let {width:w,height:h}=img;
        if(w>max||h>max){ const s=Math.min(max/w,max/h); w=Math.round(w*s); h=Math.round(h*s); }
        const c=document.createElement("canvas"); c.width=w; c.height=h;
        const ctx=c.getContext("2d"); ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
        resolve(c.toDataURL("image/jpeg",0.72));
      };
      img.onerror=reject; img.src=reader.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}
function readAsDataURL(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }

/* ============================ DASHBOARD ============================ */
function viewDashboard(){
  const exp = expensesForFY(currentFY);
  if(DB.properties.length===0){
    return emptyState("Start your property ledger",
      "Add your first rental property, then start logging expenses against it. Everything is grouped by UK tax year and stays saved on this device.",
      "Add a property", "openProperty()");
  }
  const total = exp.reduce((s,e)=>s+ (+e.amount||0),0);

  // monthly buckets
  const monthly = Array(12).fill(0);
  exp.forEach(e=>{ monthly[monthBucket(e.date)] += (+e.amount||0); });
  const maxM = Math.max(...monthly,1);
  const spark = monthly.map((v,i)=>`<div class="bar" style="height:${(v/maxM*100).toFixed(1)}%" title="${esc(FY_MONTHS[i])}: ${esc(money(v))}"><span>${i%2===0?esc(FY_MONTHS[i][0]):""}</span></div>`).join("");

  // property cards
  const pcards = DB.properties.map(p=>{
    const pe = exp.filter(e=>e.propertyId===p.id);
    const t = pe.reduce((s,e)=>s+(+e.amount||0),0);
    return `<div class="pcard">
      <div class="swatch" style="background:${p.color}"></div>
      <h3>${esc(p.name)}</h3>
      <div class="addr">${esc(p.address||"")}</div>
      <div class="amt num">${money(t)}</div>
      <div class="sub">${pe.length} ${pe.length===1?"entry":"entries"} this year</div>
    </div>`;
  }).join("");

  return `
    <section class="hero">
      <div class="eyebrow">Total expenses · ${fyLabel(currentFY)}</div>
      <div class="total mono">${money(total)}</div>
      <div class="meta"><b>${fyRangeText(currentFY)}</b> · ${exp.length} ${exp.length===1?"entry":"entries"} · ${DB.properties.length} ${DB.properties.length===1?"property":"properties"}</div>
      <div class="spark">${spark}</div>
    </section>

    <div class="section-title">By property</div>
    <div class="pcards">${pcards}</div>

    <div class="panels">
      <div class="panel"><h4>Monthly spend</h4><div class="chart-box"><canvas id="chMonthly"></canvas></div></div>
      <div class="panel"><h4>By category</h4><div class="chart-box"><canvas id="chCat"></canvas></div><div class="legend" id="catLegend"></div></div>
    </div>
    <div class="panels"><div class="panel full"><h4>Spend by property</h4><div class="chart-box" style="height:${Math.max(180,DB.properties.length*42)}px"><canvas id="chProp"></canvas></div></div></div>
  `;
}

function drawDashboardCharts(){
  destroyCharts();
  const exp = expensesForFY(currentFY);
  if(DB.properties.length===0) return;
  Chart.defaults.font.family="'Hanken Grotesk',sans-serif";
  Chart.defaults.color="#6A7480";

  // monthly
  const monthly=Array(12).fill(0); exp.forEach(e=>monthly[monthBucket(e.date)]+=(+e.amount||0));
  chartRefs.push(new Chart(document.getElementById("chMonthly"),{
    type:"bar",
    data:{labels:FY_MONTHS,datasets:[{data:monthly,backgroundColor:"#1F5F4F",borderRadius:5,maxBarThickness:30}]},
    options:baseOpts({money:true})
  }));

  // category
  const byCat={}; exp.forEach(e=>byCat[e.category]=(byCat[e.category]||0)+(+e.amount||0));
  const catEntries=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const catTotal=catEntries.reduce((s,[,v])=>s+v,0)||1;
  chartRefs.push(new Chart(document.getElementById("chCat"),{
    type:"doughnut",
    data:{labels:catEntries.map(([id])=>CATMAP[id]?CATMAP[id].name:id),
      datasets:[{data:catEntries.map(([,v])=>v),backgroundColor:catEntries.map(([id])=>CATMAP[id]?CATMAP[id].color:"#888"),borderWidth:2,borderColor:"#fff"}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:"62%",plugins:{legend:{display:false},tooltip:tooltipMoney()}}
  }));
  document.getElementById("catLegend").innerHTML = catEntries.slice(0,7).map(([id,v])=>{
    const c=CATMAP[id]||{name:id,color:"#888"};
    return `<div class="row"><span class="dot" style="background:${c.color}"></span><span class="lname">${esc(c.name)}</span><span class="lamt num">${money(v)} · ${Math.round(v/catTotal*100)}%</span></div>`;
  }).join("") || `<div class="row" style="color:var(--slate)">No expenses yet</div>`;

  // by property (horizontal)
  const byProp=DB.properties.map(p=>({p,v:exp.filter(e=>e.propertyId===p.id).reduce((s,e)=>s+(+e.amount||0),0)}));
  chartRefs.push(new Chart(document.getElementById("chProp"),{
    type:"bar",
    data:{labels:byProp.map(x=>x.p.name),datasets:[{data:byProp.map(x=>x.v),backgroundColor:byProp.map(x=>x.p.color),borderRadius:5,maxBarThickness:26}]},
    options:{...baseOpts({money:true}),indexAxis:"y"}
  }));
}
function baseOpts({money:isM}={}){
  return {responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:isM?tooltipMoney():{}},
    scales:{x:{grid:{display:false},ticks:{font:{size:11}}},
      y:{grid:{color:"#EFECE4"},border:{display:false},ticks:{font:{size:11},callback:v=>isM?CURRENCY+Number(v).toLocaleString("en-GB"):v}}}};
}
function tooltipMoney(){ return {callbacks:{label:c=>" "+money(c.parsed.y!==undefined&&!isNaN(c.parsed.y)?c.parsed.y:(c.parsed.x!==undefined?c.parsed.x:c.parsed))}}; }
function destroyCharts(){ chartRefs.forEach(c=>{try{c.destroy()}catch(e){}}); chartRefs=[]; }

  return toolbar + `<div class="ledger">

    const all = DB.expenses.filter(e=>e.propertyId===p.id);

    const fyT = all.filter(e=>taxYearOf(e.date)===currentFY).reduce((s,e)=>s+(+e.amount||0),0);
    return `<div class="pitem">
      <div class="bar" style="background:${p.color}"></div>
      <div class="info"><h3>${esc(p.name)}</h3><div class="addr">${esc(p.address||"No address")}</div></div>
      <div class="stat"><div class="a num">${money(fyT)}</div><div class="b">${fyLabel(currentFY)} · ${money(t)} all-time</div></div>
      <div class="acts">
        <button class="btn btn-ghost btn-sm" onclick="openProperty('${p.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProperty('${p.id}')">Delete</button>
      </div>
    </div>`;
  }).join("");
  return `<div class="toolbar"><div class="grow"></div><button class="btn btn-primary btn-sm" onclick="openProperty()">+ Add property</button></div><div class="plist">${items}</div>`;
}

/* ---------- property modal ---------- */
window.openProperty=function(id){

    <div class="field"><label>Property name</label><input type="text" id="pName" placeholder="e.g. 42 Norbury Crescent" value="${p?esc(p.name):""}"></div>

    <div class="field"><label>Colour</label><div id="swatches" style="display:flex;gap:8px;flex-wrap:wrap">${PCOLORS.map(c=>`<button type="button" data-c="${c}" class="sw" style="width:30px;height:30px;border-radius:8px;background:${c};border:2px solid ${ (p?p.color:PCOLORS[DB.properties.length%PCOLORS.length])===c ?"var(--ink)":"transparent"};cursor:pointer"></button>`).join("")}</div></div>`;
  const foot = `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="saveProp">${p?"Save changes":"Add property"}</button>`;
  modalShell(p?"Edit property":"Add property", body, foot);
  let chosen = p?p.color:PCOLORS[DB.properties.length%PCOLORS.length];
  document.querySelectorAll("#swatches .sw").forEach(b=>b.onclick=()=>{ chosen=b.dataset.c; document.querySelectorAll("#swatches .sw").forEach(x=>x.style.border="2px solid transparent"); b.style.border="2px solid var(--ink)"; });

window.deleteProperty=function(id){
  const p=DB.properties.find(x=>x.id===id); if(!p) return;
  const n=DB.expenses.filter(e=>e.propertyId===id).length;
  const body=`<p style="margin:0;color:var(--ink)">Delete <b>${esc(p.name)}</b>?${n?` This will also remove its <b>${n}</b> logged ${n===1?"expense":"expenses"} and ${n===1?"its receipt":"their receipts"}.`:""} This can't be undone.</p>`;
  modalShell("Delete property", body, `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" style="background:var(--clay)" id="confDel">Delete</button>`);
  document.getElementById("confDel").onclick=async()=>{
    const toRemove=DB.expenses.filter(e=>e.propertyId===id);
    for(const e of toRemove){ if(e.hasReceipt) await delReceipt(e.id); await Store.del("exp:"+e.id,true); }
    await Store.del("prop:"+id,true);
    DB.expenses=DB.expenses.filter(e=>e.propertyId!==id);
    DB.properties=DB.properties.filter(x=>x.id!==id);
    if(filterProp===id) filterProp="all";
    await bumpVer(); closeModal(); render(); toast("Property deleted");
  };
};

/* ---------- expense modal ---------- */
let _pendingReceipt=null; // {type,data} staged before save
window.openExpense=function(id){
  if(DB.properties.length===0){ toast("Add a property first"); openProperty(); return; }
  const e = id ? DB.expenses.find(x=>x.id===id) : null;
  _pendingReceipt = null;
  const propOpts=DB.properties.map(p=>`<option value="${p.id}" ${e&&e.propertyId===p.id?"selected":(!e&&filterProp!=="all"&&filterProp===p.id?"selected":"")}>${esc(p.name)}</option>`).join("");
  const catOpts=CATS.map(c=>`<option value="${c.id}" ${e&&e.category===c.id?"selected":""}>${esc(c.name)}</option>`).join("");
  const financeNote=`<div class="note" id="finNote" style="display:none"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><div><b>Heads up:</b> residential mortgage interest is no longer fully deductible — relief is given as a 20% tax credit. Log it here for your records and let your accountant apply the credit.</div></div>`;
  const body=`
    <div class="row2">
      <div class="field"><label>Property</label><select id="eProp">${propOpts}</select></div>
      <div class="field"><label>Date</label><input type="date" id="eDate" max="2100-12-31" value="${e?esc(e.date):todayISO()}"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Category</label><select id="eCat">${catOpts}</select></div>
      <div class="field"><label>Amount (${CURRENCY})</label><input type="number" id="eAmt" inputmode="decimal" step="0.01" min="0" placeholder="0.00" value="${e?esc(e.amount):""}"></div>
    </div>
    ${financeNote}
    <div class="field"><label>Supplier / payee <span style="font-weight:500;text-transform:none;letter-spacing:0">(optional)</span></label><input type="text" id="eSupp" placeholder="e.g. British Gas, J. Smith Plumbing" value="${e?esc(e.supplier||""):""}"></div>
    <div class="field"><label>Notes <span style="font-weight:500;text-transform:none;letter-spacing:0">(optional)</span></label><textarea id="eNotes" placeholder="Anything worth remembering at tax time">${e?esc(e.notes||""):""}</textarea></div>
    <div class="field"><label>Receipt</label>
      <div class="drop" id="drop"><div class="di"><b>Tap to add a photo or PDF</b><br>Stored with this expense</div></div>
      <input type="file" id="eFile" accept="image/*,application/pdf" capture="environment" style="display:none">
      <div id="receiptPrev"></div>
    </div>`;
  const foot=`${e?`<button class="btn btn-danger" style="margin-right:auto" id="delExp">Delete</button>`:""}<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="saveExp">${e?"Save changes":"Add expense"}</button>`;
  modalShell(e?"Edit expense":"Add expense", body, foot);

  const catSel=document.getElementById("eCat");
  const updateFinNote=()=>{ document.getElementById("finNote").style.display = catSel.value==="finance"?"flex":"none"; };
  catSel.onchange=updateFinNote; updateFinNote();

  const drop=document.getElementById("drop"), fileIn=document.getElementById("eFile"), prev=document.getElementById("receiptPrev");
  drop.onclick=()=>fileIn.click();
  drop.ondragover=ev=>{ev.preventDefault();drop.style.borderColor="var(--green)";};
  drop.ondragleave=()=>{drop.style.borderColor="";};
  drop.ondrop=ev=>{ev.preventDefault();drop.style.borderColor="";if(ev.dataTransfer.files[0])handleFile(ev.dataTransfer.files[0]);};
  fileIn.onchange=()=>{ if(fileIn.files[0]) handleFile(fileIn.files[0]); };

  async function handleFile(file){
    prev.innerHTML=`<div class="di" style="padding:8px;color:var(--slate)">Processing…</div>`;
    try{
      let payload;
      if(file.type==="application/pdf"){
        const data=await readAsDataURL(file);
        if(data.length>3_000_000){ prev.innerHTML=""; toast("That PDF is too large (max ~3MB)"); return; }
        payload={type:"pdf",data,name:file.name};
      } else if(file.type.startsWith("image/")){
        payload={type:"image",data:await compressImage(file)};
      } else { prev.innerHTML=""; toast("Use an image or PDF"); return; }
      _pendingReceipt=payload; renderReceiptPrev();
    }catch(err){ console.error(err); prev.innerHTML=""; toast("Couldn't read that file"); }
  }
  function renderReceiptPrev(){
    if(!_pendingReceipt){ prev.innerHTML=""; return; }
    drop.style.display="none";
    if(_pendingReceipt.type==="image"){
      prev.innerHTML=`<div class="receipt-prev"><img src="${_pendingReceipt.data}" alt="Receipt preview"><button class="rm" id="rmR">Remove</button></div>`;
    } else {
      prev.innerHTML=`<div class="receipt-prev"><div class="pdf"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>${esc(_pendingReceipt.name||"Receipt.pdf")}</div><button class="rm" id="rmR">Remove</button></div>`;
    }
    document.getElementById("rmR").onclick=()=>{ _pendingReceipt={__removed:true}; prev.innerHTML=""; drop.style.display=""; };
  }
  // existing receipt
  if(e&&e.hasReceipt){ getReceipt(e.id).then(r=>{ if(r&&!_pendingReceipt){ _pendingReceipt=r; renderReceiptPrev(); } }); }

  if(e){ document.getElementById("delExp").onclick=()=>deleteExpense(e.id); }

  document.getElementById("saveExp").onclick=async()=>{
    const propertyId=document.getElementById("eProp").value;
    const date=document.getElementById("eDate").value;
    const category=document.getElementById("eCat").value;
    const amount=parseFloat(document.getElementById("eAmt").value);
    if(!date){ toast("Pick a date"); return; }
    if(!(amount>0)){ toast("Enter an amount"); return; }
    const supplier=document.getElementById("eSupp").value.trim();
    const notes=document.getElementById("eNotes").value.trim();

    let rec=_pendingReceipt;
    let hasReceipt = e?e.hasReceipt:false;
    let recId = e?e.id:null;

    let saved;
    if(e){
      e.propertyId=propertyId; e.date=date; e.category=category; e.amount=amount; e.supplier=supplier; e.notes=notes;
      if(rec&&rec.__removed){ await delReceipt(e.id); e.hasReceipt=false; }
      else if(rec&&!rec.__removed&&rec.data){ await saveReceipt(e.id,rec); e.hasReceipt=true; }
      saved=e; toast("Expense updated");
    } else {
      const id=uid();
      const item={id,propertyId,date,category,amount,supplier,notes,hasReceipt:false,created:Date.now(),by:myName};
      if(rec&&!rec.__removed&&rec.data){ await saveReceipt(id,rec); item.hasReceipt=true; }
      DB.expenses.push(item); saved=item;
      // jump to the tax year of the new expense so the user sees it
      currentFY=taxYearOf(date);
      toast("Expense added");
    }
    await putExpense(saved); _pendingReceipt=null; closeModal(); render();
  };
  setTimeout(()=>document.getElementById("eAmt").focus(),50);
};

window.deleteExpense=function(id){
  const e=DB.expenses.find(x=>x.id===id); if(!e) return;
  modalShell("Delete expense",`<p style="margin:0">Delete this ${money(e.amount)} expense${e.supplier?` to <b>${esc(e.supplier)}</b>`:""}? This can't be undone.</p>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" style="background:var(--clay)" id="cd">Delete</button>`);
  document.getElementById("cd").onclick=async()=>{
    if(e.hasReceipt) await delReceipt(e.id);
    await Store.del("exp:"+id,true);
    DB.expenses=DB.expenses.filter(x=>x.id!==id);
    await bumpVer(); closeModal(); render(); toast("Expense deleted");
  };
};

/* ============================ CSV ============================ */
function exportCSV(){
  let exp=expensesForFY(currentFY);
  if(filterProp!=="all") exp=exp.filter(e=>e.propertyId===filterProp);
  if(filterCat!=="all") exp=exp.filter(e=>e.category===filterCat);
  exp.sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(exp.length===0){ toast("Nothing to export"); return; }
  const q=v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`;
  const head=["Date","Property","Category","Supplier/Payee","Amount (GBP)","Notes","Added by","Receipt"];
  const lines=[head.map(q).join(",")];
  exp.forEach(e=>lines.push([fmtDate(e.date),propName(e.propertyId),(CATMAP[e.category]?CATMAP[e.category].name:e.category),e.supplier||"",(+e.amount||0).toFixed(2),e.notes||"",e.by||"",e.hasReceipt?"Yes":"No"].map(q).join(",")));
  const total=exp.reduce((s,e)=>s+(+e.amount||0),0);
  lines.push(["","","","TOTAL",total.toFixed(2),"","",""].map(q).join(","));
  const blob=new Blob([lines.join("\r\n")],{type:"text/csv"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`property-expenses-${fyLabel(currentFY).replace("/","-")}.csv`; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast("CSV exported");
}

/* ============================ download helper ============================ */
function downloadBlob(content, filename, mime){
  const blob=new Blob([content],{type:mime});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}

function buildLedgerDoc(exp, scopeLabel, includeReceipts, receiptsMap){

  const byProp={}; exp.forEach(e=>{ const k=e.propertyId; (byProp[k]=byProp[k]||{n:0,t:0}); byProp[k].n++; byProp[k].t+=(+e.amount||0); });
  const byCat={};  exp.forEach(e=>{ const k=e.category;   (byCat[k]=byCat[k]||{n:0,t:0}); byCat[k].n++;  byCat[k].t+=(+e.amount||0); });

    `<tr><td>${esc(propName(id))}</td><td class="c">${v.n}</td><td class="amt">${esc(money(v.t))}</td></tr>`).join("");
  const catRows = Object.entries(byCat).sort((a,b)=>b[1].t-a[1].t).map(([id,v])=>

async function downloadPrintableLedger(scope, includeReceipts){
  let exp, scopeLabel;
  if(scope==="all"){
    exp=[...DB.expenses];
    scopeLabel="All tax years · all properties";
  } else {
    exp=filteredExpenses();
    scopeLabel = `Tax year ${fyLabel(currentFY)} (${fyRangeText(currentFY)})`
      + (filterProp!=="all" ? ` · ${propName(filterProp)}` : " · all properties")
      + (filterCat!=="all" ? ` · ${CATMAP[filterCat].name}` : "");
  }
  exp = exp.slice().sort((a,b)=> new Date(a.date)-new Date(b.date) || (a.created||0)-(b.created||0)); // chronological for a ledger
  const receiptsMap={};
  if(includeReceipts){ for(const e of exp){ if(e.hasReceipt){ const r=await getReceipt(e.id); if(r) receiptsMap[e.id]=r; } } }
  const html=buildLedgerDoc(exp, scopeLabel, includeReceipts, receiptsMap);
  const fn = scope==="all" ? "property-ledger-all.html" : `property-ledger-${fyLabel(currentFY).replace("/","-")}.html`;
  downloadBlob(html, fn, "text/html");
}

/* ============================ backup / restore ============================ */
async function downloadBackup(){
  const receipts={};
  for(const e of DB.expenses){ if(e.hasReceipt){ const r=await getReceipt(e.id); if(r) receipts[e.id]=r; } }
  const data={ app:"property-ledger", schema:1, exportedAt:new Date().toISOString(), properties:DB.properties, expenses:DB.expenses, receipts };
  downloadBlob(JSON.stringify(data,null,2), `property-ledger-backup-${todayISO()}.json`, "application/json");
}
async function restoreBackup(file){
  let data;
  try{ data=JSON.parse(await file.text()); }catch(e){ toast("That file isn't a valid backup"); return; }
  if(!data || data.app!=="property-ledger" || !Array.isArray(data.properties) || !Array.isArray(data.expenses)){ toast("Unrecognised backup file"); return; }
  for(const p of data.properties){ if(p&&p.id) await Store.set("prop:"+p.id, await encWith(CRYPTO_KEY, JSON.stringify(p)), true); }
  for(const e of data.expenses){ if(e&&e.id) await Store.set("exp:"+e.id, await encWith(CRYPTO_KEY, JSON.stringify(e)), true); }
  if(data.receipts){ for(const [id,r] of Object.entries(data.receipts)){ if(r) await Store.set("receipt:"+id, await encWith(CRYPTO_KEY, JSON.stringify(r)), true); } }
  await bumpVer(); await loadDB(); render();
  toast("Backup restored");
}

async function syncNow(silent){
  const btn=document.getElementById("syncBtn"); if(btn) btn.classList.add("spin");

  if(btn) setTimeout(()=>btn.classList.remove("spin"),600);
  if(!silent) toast("Synced");

let _rtStarted=false, _rtChannel=null;
function startPolling(){ // Supabase Realtime: live updates between family members
  if(_rtStarted || !sb) return; _rtStarted=true;
  let t=null;
  const onChange=()=>{
    clearTimeout(t);
    t=setTimeout(async()=>{
      if(!CRYPTO_KEY) return;                                    // locked
      if(Date.now()-lastLocalWrite < 2500) return;               // our own change, already shown
      if(document.getElementById("scrim")) return;               // don't disrupt an open dialog
      const ae=document.activeElement;                            // don't yank focus while typing
      if(ae && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)) return;
      await loadDB(); render(); toast("Ledger updated");
    }, 700);
  };
  _rtChannel = sb.channel("ledger-changes")
    .on("postgres_changes",{event:"*",schema:"public",table:"properties"},onChange)
    .on("postgres_changes",{event:"*",schema:"public",table:"expenses"},onChange)
    .on("postgres_changes",{event:"*",schema:"public",table:"receipts"},onChange)
    .subscribe();
}

/* ============================ password gate ============================ */
const LOCK_SVG=`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>`;

function showGate(){
  const root=document.getElementById("gateRoot");
  root.innerHTML=`<div class="gate"><div class="gate-card">
    <div class="gate-key">${LOCK_SVG}</div>
    <h1>Property Ledger</h1>
    <p class="gate-sub">Enter the family password to open the shared ledger.</p>
    <div class="gate-field"><input type="password" id="pw1" placeholder="Family password" autocomplete="current-password"></div>
    <div class="gate-err" id="gateErr"></div>
    <button class="btn btn-primary gate-btn" id="gateGo">Unlock</button>
    <button class="gate-link" id="forgotBtn">Forgot password?</button>
  </div></div>`;
  const pw1=document.getElementById("pw1"); setTimeout(()=>pw1.focus(),60);
  const setErr=m=>{ document.getElementById("gateErr").textContent=m; };
  const go=document.getElementById("gateGo");
  pw1.addEventListener("keydown",e=>{ if(e.key==="Enter") go.click(); });
  go.onclick=async()=>{
    const p1=pw1.value;
    if(!p1){ setErr("Enter the password."); return; }
    go.disabled=true; go.textContent="Unlocking…";
    let res;
    try{ res=await attemptUnlock(p1); }catch(e){ console.error(e); res={ok:false,reason:"err"}; }
    if(!res.ok){
      setErr(res.reason==="auth" ? "Wrong password — or the shared account isn't set up yet (see README)." : "That password doesn't match this ledger.");
      go.disabled=false; go.textContent="Unlock"; pw1.select(); return;
    }
    unlockApp();
  };
  document.getElementById("forgotBtn").onclick=confirmReset;
}
function confirmReset(){
  document.querySelector("#gateRoot .gate-card").innerHTML=`
    <div class="gate-key danger">${LOCK_SVG}</div>
    <h1>Forgotten password</h1>
    <p class="gate-sub" style="text-align:left">The ledger is encrypted with the family password, so it can't be recovered — only reset. To start over:</p>
    <ol style="text-align:left;color:var(--slate);font-size:.86rem;line-height:1.6;margin:0 0 18px;padding-left:20px">
      <li>In your <b>Supabase dashboard</b>, open <b>Authentication → Users</b> and set a new password on the shared login (or delete and recreate it).</li>
      <li>Open <b>Table Editor</b> and delete all rows in <b>properties</b>, <b>expenses</b>, <b>receipts</b> and <b>meta</b>.</li>
      <li>Come back here and sign in with the new password to start fresh.</li>
    </ol>
    <button class="gate-link" id="backBtn">Back</button>`;
  document.getElementById("backBtn").onclick=()=>showGate();
}
async function unlockApp(){
  document.getElementById("gateRoot").innerHTML="";
  document.body.classList.remove("locked");
  await loadMe(); await loadDB();
  renderIdentity(); render(); maybeShowShareBanner();
  if(!myName) changeName();
  startPolling();
}
async function lockApp(){
  CRYPTO_KEY=null; DB=freshDB();
  if(_rtChannel){ try{ sb.removeChannel(_rtChannel); }catch(e){} _rtChannel=null; }
  _rtStarted=false;
  await sbSignOut();
  document.body.classList.add("locked");
  const v=document.getElementById("view"); if(v) v.innerHTML="";
  showGate();
}

/* ============================ security menu ============================ */
window.openLockMenu=function(){
  const body=`<p style="margin:0 0 16px;color:var(--slate);font-size:.9rem;line-height:1.5">One password is shared by everyone using this ledger. The data is encrypted with it.</p>
    <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-bottom:10px" id="cpBtn">Change password</button>
    <button class="btn btn-ghost" style="width:100%;justify-content:center" id="lockNow">Lock now</button>`;
  modalShell("Security", body, `<button class="btn btn-ghost" onclick="closeModal()">Close</button>`);
  document.getElementById("lockNow").onclick=()=>{ closeModal(); lockApp(); };
  document.getElementById("cpBtn").onclick=openChangePw;
};
function openChangePw(){
  const body=`<div class="field"><label>New password</label><input type="password" id="np1" autocomplete="new-password"></div>
    <div class="field"><label>Confirm new password</label><input type="password" id="np2" autocomplete="new-password"><div class="hint" id="cpErr" style="color:var(--clay)"></div></div>
    <div class="note"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><div>Everyone will need the new password the next time they open the ledger. Existing data is re-encrypted automatically.</div></div>`;
  modalShell("Change password", body, `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="cpSave">Change password</button>`);
  document.getElementById("cpSave").onclick=async()=>{
    const a=document.getElementById("np1").value, b=document.getElementById("np2").value;
    const setErr=m=>document.getElementById("cpErr").textContent=m;
    if(a.length<6){ setErr("Use at least 6 characters."); return; }
    if(a!==b){ setErr("Passwords don't match."); return; }
    const btn=document.getElementById("cpSave"); btn.disabled=true; btn.textContent="Updating…";
    try{ await changePassword(a); closeModal(); toast("Password changed"); }
    catch(e){ console.error(e); setErr("Couldn't change password."); btn.disabled=false; btn.textContent="Change password"; }
  };
}

/* ============================ boot ============================ */
(async function(){
  document.body.classList.add("locked");
  if(!SB_READY || !sb){
    document.getElementById("gateRoot").innerHTML=`<div class="gate"><div class="gate-card"><div class="gate-key">${LOCK_SVG}</div><h1>Property Ledger</h1><p class="gate-sub">Almost there — open <b>index.html</b> and paste your Supabase URL and anon key into the config block near the top, then reload. The included <b>README</b> walks through the 5-minute setup.</p></div></div>`;
    return;
  }
  if(!(window.crypto && crypto.subtle)){
    document.getElementById("gateRoot").innerHTML=`<div class="gate"><div class="gate-card"><div class="gate-key">${LOCK_SVG}</div><h1>Property Ledger</h1><p class="gate-sub">This app needs a secure (https) connection to run its encryption. Open it over https — GitHub Pages serves https automatically.</p></div></div>`;
    return;
  }
  showGate();
})();
